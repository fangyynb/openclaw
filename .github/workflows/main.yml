name: Export OpenClaw Image

on:
  workflow_dispatch:
    inputs:
      architecture:
        description: '选择运行的目标架构 (Select Target Architecture)'
        required: true
        default: 'amd64'
        type: choice
        options:
          - amd64
          - arm64

jobs:
  build-and-export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 设置跨平台构建环境
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 核心步骤：只负责构建镜像
      - name: Build Docker Image
        run: |
          docker buildx build \
            --platform linux/${{ github.event.inputs.architecture }} \
            -t openclaw:local \
            -f Dockerfile \
            --load .

      # 将镜像保存为 tar 文件
      - name: Save Image to Tar
        run: |
          docker save openclaw:local -o openclaw_${{ github.event.inputs.architecture }}.tar

      # 上传到 GitHub Actions 的 Artifacts 供下载
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-${{ github.event.inputs.architecture }}-image
          path: openclaw_${{ github.event.inputs.architecture }}.tar
          retention-days: 1
